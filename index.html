<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="stylesheet" href="style.css">

    <!-- Tailwind + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

</head>

<body class="max-w-lg mx-auto ">

    <main>
        <section class="text-center md:shadow-[0_0px_10px_rgba(0,0,0,0.08)] lg:shadow-[0_0px_10px_rgba(0,0,0,0.08)] rounded-xl p-2.5 space-y-6 mt-30 mb-30">

            <img class="mx-auto mt-8" src="./assets/github-logo.png" alt="">

            <div>
                <h2 class="font-semibold text-[24px]">GitHub Issues Tracker</h2>
                <p class="text-[#64748B]"> Sign in to manage your issues</p>
            </div>

            <div class="form">
                <fieldset class="fieldset bg-base-100 w-full  max-w-lg shrink-0 p-8 mx-auto rounded-3xl">

                    <label class="label  font-medium text-[16px] text-[#1F2937]">Username</label>
                    <input id="username" type="text"  class="input w-full text-[16px] p-6 "
                        placeholder="Enter Username" value="admin" />
                    <p class="flex flex-start pb-4 text-[#4A00FF] text-[16px]">Default: admin</p>

                    <label class="label font-medium text-[16px] text-[#1F2937]">Password</label>
                    <input id="pass" type="password" class="input w-full text-[16px] p-6 "
                        placeholder="Enter Password" />
                    <p class="flex flex-start pb-4 text-[#4A00FF] text-[16px]">Default: admin123</p>
                    <button id="signin-button"
                        class="btn btn-neutral text-[#FFFFFF] hover:bg-[#3a25c1] text-[16px] mt-4 bg-[#4A00FF] p-6">Sign
                        In</button>
                </fieldset>
            </div>

            <div class="divider ml-8 mr-8">OR</div>

            <div>
                <p class="text-center text-[#64748B]">Demo Credentials:</p>
            </div>
            <div class="bg-base-200 p-6 rounded-lg max-w-[86%] lg:max-w-md mx-auto mb-8">
                <p> <strong>Username:</strong> admin <br>
                    <strong>Password:</strong> admin123</p>
            </div>
        </section>

    </main>

    <script src="./script.js/login.js"></script>
</body>

</html>
